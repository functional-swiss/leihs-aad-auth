- name: make sure `/etc/leihs/' exists
  file:
    path: /etc/leihs
    state: directory
    mode: '0755'

- name: install config
  template:
    src: '{{config_file}}'
    dest: '/etc/leihs/{{app_name}}.yml'
    mode: '0640'
    owner: root
    group: '{{app_user}}'

- name: copy service file
  template:
    src: 'leihs-aad-auth.service'
    dest: /etc/systemd/system/{{app_name}}.service
    mode: 0644

- name: restart {{app_name}}.service
  service:
    name: '{{app_name}}.service'
    state: restarted
    daemon_reload: yes
    enabled: yes
